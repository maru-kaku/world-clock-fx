<!DOCTYPE html>
<html lang="ja">

  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FX World Clock Premium</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link
                href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap"
                rel="stylesheet">
      <style>
                :root {
                              --bg-color: #0d0d0d;
                              --card-bg: #1a1a1a;
                              --text-primary: #e0e0e0;
                              --text-secondary: #888;
                              --accent-color: #ffd700;
                              --market-open: #4caf50;
                              --market-closed: #f44336;
                              --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                }

                * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                }

                body {
                              background-color: var(--bg-color);
                              color: var(--text-primary);
                              font-family: 'Inter', sans-serif;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              min-height: 100vh;
                              overflow: hidden;
                }

                .clock-container {
                              background: linear-gradient(145deg, #1e1e1e, #141414);
                              padding: 2rem;
                              border-radius: 20px;
                              box-shadow: var(--card-shadow);
                              border: 1px solid #333;
                              width: 100%;
                              max-width: 800px;
                              transition: all 0.3s ease;
                }

                header {
                              margin-bottom: 2rem;
                              text-align: center;
                }

                header h1 {
                              font-size: 0.9rem;
                              letter-spacing: 0.3rem;
                              color: var(--text-secondary);
                              font-weight: 300;
                }

                .fx-badge {
                              background: var(--accent-color);
                              color: black;
                              padding: 2px 6px;
                              border-radius: 4px;
                              font-size: 0.7rem;
                              font-weight: 600;
                              margin-left: 5px;
                              vertical-align: middle;
                }

                .clocks-grid {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                              gap: 1.5rem;
                }

                .clock-card {
                              background: var(--card-bg);
                              padding: 1.5rem;
                              border-radius: 12px;
                              border-top: 2px solid #333;
                              transition: transform 0.2s ease, border-top-color 0.3s ease;
                }

                .clock-card:hover {
                              transform: translateY(-5px);
                              border-top-color: var(--accent-color);
                }

                .city-info {
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                              margin-bottom: 0.5rem;
                }

                .city-name {
                              font-size: 0.8rem;
                              font-weight: 600;
                              color: var(--text-secondary);
                              letter-spacing: 0.1rem;
                }

                .status-indicator {
                              width: 8px;
                              height: 8px;
                              border-radius: 50%;
                              background: var(--text-secondary);
                }

                .status-indicator.open {
                              background: var(--market-open);
                              box-shadow: 0 0 10px var(--market-open);
                }

                .time-display {
                              font-family: 'JetBrains Mono', monospace;
                              font-size: 2.2rem;
                              font-weight: 500;
                              margin-bottom: 0.2rem;
                              white-space: nowrap;
                }

                .date-display {
                              font-size: 0.75rem;
                              color: var(--text-secondary);
                }

                footer {
                              margin-top: 2rem;
                              text-align: center;
                }

                .market-status {
                              font-size: 0.7rem;
                              color: var(--text-secondary);
                              text-transform: uppercase;
                              letter-spacing: 0.05rem;
                }

                @media (max-width: 500px) {
                              .clock-container {
                                                padding: 1rem;
                                                max-width: 300px;
                              }

                              .clocks-grid {
                                                grid-template-columns: 1fr;
                                                gap: 0.8rem;
                              }

                              .time-display {
                                                font-size: 1.8rem;
                              }

                              header {
                                                margin-bottom: 1rem;
                              }
                }
            </style>
  </head>

  <body>
        <div class="clock-container" id="clockContainer">
                  <header>
                                <h1>WORLD CLOCK <span class="fx-badge">FX</span>span></h1>
                  </header>
        
                <div class="clocks-grid">
                            <div class="clock-card" id="tokyo-card">
                                            <div class="city-info">
                                                                <span class="city-name">TOKYO</span>span>
                                                                <span class="status-indicator" id="tokyo-status"></span>span>
                                            </div>div>
                                            <div class="time-display">
                                                                <span class="time" id="tokyo-time">00:00:00</span>span>
                                            </div>div>
                                            <div class="date-display" id="tokyo-date">----/--/--</div>div>
                            </div>div>
                
                            <div class="clock-card" id="london-card">
                                            <div class="city-info">
                                                                <span class="city-name">LONDON</span>span>
                                                                <span class="status-indicator" id="london-status"></span>span>
                                            </div>div>
                                            <div class="time-display">
                                                                <span class="time" id="london-time">00:00:00</span>span>
                                            </div>div>
                                            <div class="date-display" id="london-date">----/--/--</div>div>
                            </div>div>
                
                            <div class="clock-card" id="newyork-card">
                                            <div class="city-info">
                                                                <span class="city-name">NEW YORK</span>span>
                                                                <span class="status-indicator" id="newyork-status"></span>span>
                                            </div>div>
                                            <div class="time-display">
                                                                <span class="time" id="newyork-time">00:00:00</span>span>
                                            </div>div>
                                            <div class="date-display" id="newyork-date">----/--/--</div>div>
                            </div>div>
                </div>div>
        
                <footer>
                              <div class="market-status">
                                                <p id="market-message">24H Global FX Market Monitor Active</p>p>
                              </div>div>
                </footer>
        </div>div>

        <script>
                  const timezones = {
                                tokyo: 'Asia/Tokyo',
                                london: 'Europe/London',
                                newyork: 'America/New_York'
                  };

                  function updateClocks() {
                                const now = new Date();

                                for (const [id, zone] of Object.entries(timezones)) {
                                                  const timeEl = document.getElementById(`${id}-time`);
                                                  const dateEl = document.getElementById(`${id}-date`);
                                                  const statusEl = document.getElementById(`${id}-status`);

                                                  const timeStr = new Intl.DateTimeFormat('ja-JP', {
                                                                        timeZone: zone,
                                                                        hour: '2-digit',
                                                                        minute: '2-digit',
                                                                        second: '2-digit',
                                                                        hour12: false
                                                  }).format(now);

                                                  const dateStr = new Intl.DateTimeFormat('ja-JP', {
                                                                        timeZone: zone,
                                                                        year: 'numeric',
                                                                        month: '2-digit',
                                                                        day: '2-digit',
                                                                        weekday: 'short'
                                                  }).format(now);

                                                  timeEl.textContent = timeStr;
                                                  dateEl.textContent = dateStr;

                                                  const localHour = parseInt(timeStr.split(':')[0]);
                                                  let isOpen = false;

                                                  if (id === 'tokyo' && localHour >= 9 && localHour < 18) isOpen = true;
                                                  if (id === 'london' && localHour >= 8 && localHour < 17) isOpen = true;
                                                  if (id === 'newyork' && localHour >= 8 && localHour < 17) isOpen = true;

                                                  if (isOpen) {
                                                                        statusEl.classList.add('open');
                                                  } else {
                                                                        statusEl.classList.remove('open');
                                                  }
                                }
                  }

                  updateClocks();
                  setInterval(updateClocks, 1000);
        </script>
  </body>

</html>

        </script>
                </footer></h1>
                  </header>
  </body>
      </style></title>
  </head>
